migration_generate:
  stage: migration_generate
  image: node:23-alpine
  needs: [build]
  services:
    - docker:dind
  before_script:
    - apk update && apk add docker-cli openssh-client bash
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin;
  script:
    - docker pull $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker create --name tmp-container-$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker cp tmp-container-$CI_COMMIT_SHORT_SHA:/app/dist ./dist
    - docker cp tmp-container-$CI_COMMIT_SHORT_SHA:/app/node_modules ./node_modules
    - docker rm tmp-container-$CI_COMMIT_SHORT_SHA
    - echo "$ENV_FILE" > .env
    - echo "DB_HOST=$MIGRATION_DB_HOST" >> .env
    - echo "DB_PORT=$MIGRATION_DB_PORT" >> .env
    - npm run migration:generate
    - mkdir -p artifacts_migration
    - |
      if [ -d dist/db/migrations ] && [ "$(ls -A dist/db/migrations)" ]; then
        cp -r dist/db/migrations artifacts_migration/;
        cat dist/db/migrations/* 2>/dev/null
      else
        exit 1;
      fi
  artifacts:
    paths:
      - artifacts_migration
    expire_in: 1 hour

push_migrations:
  stage: push_migrations
  image: node:23-alpine
  needs: [migration_generate]
  dependencies:
    - migration_generate
  before_script:
    - apk update && apk add --no-cache bash git
  script:
    - git clone https://gitlab-ci-token:$CI_JOB_TOKEN@$MIGRATION_STORAGE_REPO
    - cd migrations-storage
    - git checkout -b migrate || git checkout migrate
    - mkdir -p $CI_PROJECT_NAME
    - mkdir -p $CI_PROJECT_NAME/$CI_COMMIT_BRANCH
    - rm -rf $CI_PROJECT_NAME/$CI_COMMIT_BRANCH/*
    - cp -r ../artifacts_migration/* ./$CI_PROJECT_NAME/$CI_COMMIT_BRANCH/
    - ls -la ./$CI_PROJECT_NAME/$CI_COMMIT_BRANCH
    - git add .
    - git config --global user.email $GITLAB_USER_EMAIL
    - git config --global user.name $GITLAB_USER_NAME
    - git commit -m "Update migration scripts" || echo "No change"
    - git push https://token:$MIGRATION_ACCESS_TOKEN@$MIGRATION_STORAGE_REPO migrate
    - cat ./$CI_PROJECT_NAME/$CI_COMMIT_BRANCH/migrations/* 2>/dev/null
    - echo "Migration url - https://gitlab.xipat.com/megaminds/migrations-storage/-/tree/migrate/$CI_PROJECT_NAME/$CI_COMMIT_BRANCH"

migration_apply:
  stage: migration_apply
  image: node:23-alpine
  needs:
    - build
    - push_migrations
  before_script:
    - apk update && apk add --no-cache docker-cli openssh-client bash git
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin;
  script:
    - docker pull $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker create --name tmp-container-$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker cp tmp-container-$CI_COMMIT_SHORT_SHA:/app/dist ./dist
    - docker cp tmp-container-$CI_COMMIT_SHORT_SHA:/app/node_modules ./node_modules
    - docker rm tmp-container-$CI_COMMIT_SHORT_SHA
    - git clone https://gitlab-ci-token:$CI_JOB_TOKEN@$MIGRATION_STORAGE_REPO
    - cd migrations-storage
    - git checkout -b migrate || git checkout migrate
    - cp -r ./$CI_PROJECT_NAME/$CI_COMMIT_BRANCH/migrations ../dist/db/
    - ls -l ../dist/db/
    - cd ..
    - echo "$ENV_FILE" > .env
    - echo "DB_HOST=$MIGRATION_DB_HOST" >> .env
    - echo "DB_PORT=$MIGRATION_DB_PORT" >> .env
    - npm run migration:run
  when: manual
  allow_failure: false

deploy:
  stage: deploy
  extends: .deploy_template
  needs:
    - migration_generate
    - migration_apply

deploy_without_migration:
  stage: deploy_without_migration
  extends: .deploy_template
  needs:
    - migration_generate
  when: on_failure

deploy_manual:
  stage: deploy_manual
  extends: .deploy_template
  needs:
    - build
  when: manual
