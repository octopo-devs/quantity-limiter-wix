variables:
  #Required defined variable
  NAMESPACE: app-order-limiter
  DOCKER_SECRET_NAME: gitlab-registry

  #Migration Variables
  MIGRATION_DB_HOST: $MEGAMIND_DEV_SERVER_IP #Required defined variable
  MIGRATION_DB_PORT: 32306 #Required defined variable
  MIGRATION_STORAGE_REPO: gitlab.xipat.com/megaminds/migrations-storage.git #Do not change
  MIGRATION_ACCESS_TOKEN: $MIGRATION_ACCESS_TOKEN #Do not change

  #Constants variable
  DEPLOY_USERNAME: $DEPLOY_USERNAME
  DEPLOY_PASSWORD: $DEPLOY_PASSWORD

  #Group env Variables
  IMAGE_TAG: develop
  SERVER_IP: $MEGAMIND_DEV_SERVER_IP
  SSH_USERNAME: $MEGAMIND_DEV_SSH_USER
  SSH_PRIVATE_KEY: $MEGAMIND_DEV_SSH_KEY
  SA_SECRET: $MEGAMIND_DEV_SA_SECRET

  #Project Variables
  ENV_FILE: $DEV_ENV
  STOREFRONT_ENV_FILE: $STOREFRONT_DEV_ENV
  MIN_REPLICAS: 1
  MAX_REPLICAS: 2
  API_ENDPOINT_PREFIX: /w/api # Phải bắt đầu với /
  PUBLIC_API_ENDPOINT_PREFIX: /p/api
  INGRESS_DOMAIN: order-limiter-wix-dev.megamind-dev.online
  ENV_DB_HOST: mariadb-0.mariadb-internal.database.svc.cluster.local
  ENV_DB_PORT: '3306'

workflow:
  name: 'Pipeline for branch: $CI_COMMIT_BRANCH'
  rules:
    - if: $CI_COMMIT_TITLE =~ /-draft$/
      when: never
    - if: $CI_COMMIT_TAG
      changes:
        - main
      variables:
        IMAGE_TAG: latest
        SERVER_IP: $BLOCKIFY_LIVE_SERVER_IP
        SSH_USERNAME: $BLOCKIFY_LIVE_SSH_USER
        SSH_PRIVATE_KEY: $BLOCKIFY_LIVE_SSH_KEY
        SA_SECRET: $BLOCKIFY_LIVE_SA_SECRET
        ENV_FILE: $LIVE_ENV
        STOREFRONT_ENV_FILE: $STOREFRONT_LIVE_ENV
        MIN_REPLICAS: 1
        MAX_REPLICAS: 3
        API_ENDPOINT_PREFIX: /w/api
        PUBLIC_API_ENDPOINT_PREFIX: /p/api
        INGRESS_DOMAIN: order-limiter-wix.synctrack.ioo
        ENV_DB_HOST: $DB_LIVE_SERVER_IP
        ENV_DB_PORT: $DB_LIVE_SERVER_MARIADB_PORT

        #Migration Variables
        MIGRATION_DB_HOST: $DB_LIVE_SERVER_IP
        MIGRATION_DB_PORT: $DB_LIVE_SERVER_MARIADB_PORT
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always
    - when: never

stages:
  - build
  - migration_generate
  - push_migrations
  - migration_apply
  - deploy
  - deploy_without_migration
  - deploy_manual

.deploy_template:
  image:
    name: bitnamisecure/kubectl:latest
    entrypoint: ['']
  before_script:
    - kubectl config set-cluster deploy-cluster --server=https://$SERVER_IP:6443 --insecure-skip-tls-verify
    - kubectl config set-credentials cicd-sa-token --token=$(echo $SA_SECRET | base64 -d)
    - kubectl config set-context deploy-context --cluster=deploy-cluster --user=cicd-sa-token
    - kubectl config use-context deploy-context
    - kubectl get namespace "$NAMESPACE" || kubectl create namespace "$NAMESPACE"
    - kubectl delete secret $DOCKER_SECRET_NAME -n $NAMESPACE --ignore-not-found
    - kubectl create secret -n $NAMESPACE docker-registry $DOCKER_SECRET_NAME --docker-server="$CI_REGISTRY" --docker-username="$DEPLOY_USERNAME" --docker-password="$DEPLOY_PASSWORD" --docker-email=$CI_REGISTRY_USER --dry-run=client -o yaml | kubectl apply -f -
  script:
    - kubectl config view
    - kubectl get ns -o wide
    - echo "$ENV_FILE" > .env
    - kubectl create -n $NAMESPACE configmap $CI_PROJECT_NAME --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f -
    - sed -i "s|__IMAGE__|$CI_REGISTRY_IMAGE:$IMAGE_TAG|g" ./k8s/*.yaml
    - sed -i "s|__PULL_SECRET_NAME__|$DOCKER_SECRET_NAME|g" ./k8s/*.yaml
    - sed -i "s|__CI_COMMIT_SHA__|$CI_COMMIT_SHA|g" ./k8s/*.yaml
    - sed -i "s|__NAMESPACE__|$NAMESPACE|g" ./k8s/*.yaml
    - sed -i "s|__CI_PROJECT_NAME__|$CI_PROJECT_NAME|g" ./k8s/*.yaml
    - sed -i "s|__API_ENDPOINT_PREFIX__|$API_ENDPOINT_PREFIX|g" ./k8s/*.yaml
    - sed -i "s|__PUBLIC_API_ENDPOINT_PREFIX__|$PUBLIC_API_ENDPOINT_PREFIX|g" ./k8s/*.yaml
    - sed -i "s|__MIN_REPLICAS__|$MIN_REPLICAS|g" ./k8s/*.yaml
    - sed -i "s|__MAX_REPLICAS__|$MAX_REPLICAS|g" ./k8s/*.yaml
    - sed -i "s|__INGRESS_DOMAIN__|$INGRESS_DOMAIN|g" ./k8s/*.yaml
    - sed -i "s|__DB_HOST__|$ENV_DB_HOST|g" ./k8s/*.yaml
    - sed -i "s|__DB_PORT__|$ENV_DB_PORT|g" ./k8s/*.yaml
    - |
      if [[ "$IMAGE_TAG" == "develop" ]]; then
        echo "Commenting out CPU request for development environment..."
        sed -i "s|cpu:|#cpu:|g" ./k8s/*.yaml
      fi
    - kubectl apply -f ./k8s/

build:
  stage: build
  services:
    - docker:dind
  script:
    - env
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin;
    - echo "$STOREFRONT_ENV_FILE" > ./storefront/.env
    # - docker pull $CI_REGISTRY_IMAGE:$IMAGE_TAG || true
    # - docker build --tag $CI_REGISTRY_IMAGE:$IMAGE_TAG .
    - docker build --cache-from $CI_REGISTRY_IMAGE:$IMAGE_TAG --tag $CI_REGISTRY_IMAGE:$IMAGE_TAG .
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG

