<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order limiter settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Text:ital,wght@0,400..800;1,400..800&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Wix Madefor Text', sans-serif;
    }

    .est-custom-wix-btn {
      background-color: #116dff;
      border-radius: 18px;
      color: #fff;
      font-weight: 530;
      font-size: 16px;
      min-width: 84px;
      cursor: pointer;
      border: none;
      padding: 6px 24px;
      height: 36px;
      font-family: 'Wix Madefor Text', sans-serif;

      &:hover {
        background-color: #0f62e6;
      }
    }

    .est-wrap-content {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      height: 100%;
      font-optical-sizing: auto;
      padding: 0 8px;
      font-size: 16px;
    }

    .est-img-admin-dashboard {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .est-wrap-text {
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="est-wrap-content">
    <img src="./admin-dashboard.png" alt="admin-dashboard" class="est-img-admin-dashboard" />
    <p class="est-wrap-text">
      For further editing and advanced settings of your Order limiter Delivery Date setup, please go to the app
      dashboard. You can
      still manage product-specific delivery settings directly in the ‘Manage’ section on Wix Studio.
    </p>

        <button class="est-custom-wix-btn" onclick="window.open('https://www.wix.com/dashboard', '_blank')">
          Go to App Dashboard
        </button>
      </div> -->
  </div>
</body>

</html>
