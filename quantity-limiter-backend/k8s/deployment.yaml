apiVersion: v1
kind: Service
metadata:
  name: __CI_PROJECT_NAME__-service
  namespace: __NAMESPACE__
spec:
  type: ClusterIP
  selector:
    app: __CI_PROJECT_NAME__
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __CI_PROJECT_NAME__
  namespace: __NAMESPACE__
  labels:
    app: __CI_PROJECT_NAME__
spec:
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: 0 có nghĩa là trong quá trình update, số lượng pod sẵn sàng không bao giờ được thấp hơn 'replicas' (ở đây là 4).
      maxUnavailable: 0
      # maxSurge: 2 có nghĩa là Kubernetes được phép tạo tối đa 2 pod mới vượt quá số lượng 'replicas' trong quá trình update.
      maxSurge: 2
  selector:
    matchLabels:
      app: __CI_PROJECT_NAME__
  template:
    metadata:
      annotations:
        commit-sha: __CI_COMMIT_SHA__
      labels:
        app: __CI_PROJECT_NAME__
    spec:
      tolerations:
      - key: "volume"
        operator: "Equal"
        value: "false"
        effect: "NoExecute"
      imagePullSecrets:
        - name: __PULL_SECRET_NAME__
      containers:
        - name: __CI_PROJECT_NAME__
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: __API_ENDPOINT_PREFIX__/health/ready
              port: 3000
            # Chờ 15 giây sau khi container khởi động mới bắt đầu kiểm tra lần đầu
            initialDelaySeconds: 15
            # Mỗi 10 giây kiểm tra một lần
            periodSeconds: 10
            # Coi là thất bại nếu không nhận được phản hồi trong 5 giây
            timeoutSeconds: 5
            # Coi là pod sẵn sàng sau 1 lần kiểm tra thành công
            successThreshold: 1
            # Coi là pod không sẵn sàng sau 3 lần kiểm tra thất bại liên tiếp
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: __API_ENDPOINT_PREFIX__/health/live
              port: 3000
            # Chờ 60 giây mới bắt đầu kiểm tra, cho app đủ thời gian khởi động hẳn
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          # --- THÊM LIFECYCLE HOOK ĐỂ SHUTDOWN MƯỢT MÀ HƠN ---
          lifecycle:
            preStop:
              exec:
                # Cho ứng dụng 10 giây để hoàn thành các request đang xử lý
                # trước khi nhận tín hiệu SIGTERM
                command: ['/bin/sh', '-c', 'sleep 10']
          # --- KẾT THÚC LIFECYCLE HOOK ---
          env:
            - name: 'name'
              value: __CI_PROJECT_NAME__
            - name: 'PORT'
              value: '3000'
            - name: "DB_HOST"
              value: __DB_HOST__
            - name: "DB_PORT"
              value: '__DB_PORT__'
            - name: 'API_ENDPOINT_PREFIX'
              value: __API_ENDPOINT_PREFIX__
          envFrom:
            - configMapRef:
                name: __CI_PROJECT_NAME__
          resources:
            requests:
              memory: '256Mi'
              cpu: '200m'
            limits:
              memory: '512Mi'
              cpu: 500m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __CI_PROJECT_NAME__-cron
  namespace: __NAMESPACE__
  labels:
    app: __CI_PROJECT_NAME__-cron
spec:
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: __CI_PROJECT_NAME__-cron
  template:
    metadata:
      annotations:
        commit-sha: __CI_COMMIT_SHA__
      labels:
        app: __CI_PROJECT_NAME__-cron
    spec:
      tolerations:
      - key: "volume"
        operator: "Equal"
        value: "false"
        effect: "NoExecute"
      imagePullSecrets:
        - name: __PULL_SECRET_NAME__
      containers:
        - name: __CI_PROJECT_NAME__-cron
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: 'PORT'
              value: '3001'
            - name: 'name'
              value: __CI_PROJECT_NAME__-cron
            - name: "DB_HOST"
              value: __DB_HOST__
            - name: "DB_PORT"
              value: '__DB_PORT__'
            - name: 'API_ENDPOINT_PREFIX'
              value: __API_ENDPOINT_PREFIX__
          envFrom:
            - configMapRef:
                name: __CI_PROJECT_NAME__
          resources:
            requests:
              memory: '256Mi'
              cpu: '200m'
            limits:
              memory: '512Mi'
              cpu: 500m
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: __CI_PROJECT_NAME__-hpa
  namespace: __NAMESPACE__
spec:
  # Trỏ đến Deployment cần scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: __CI_PROJECT_NAME__

  # Cấu hình số lượng pod
  minReplicas: __MIN_REPLICAS__ # Thay thế bằng giá trị mong muốn, ví dụ: 1 cho môi trường develop
  maxReplicas: __MAX_REPLICAS__ # Thay thế bằng giá trị mong muốn, ví dụ: 15 cho môi trường production

  # Định nghĩa các chỉ số để scale
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Tương đương --cpu-percent=70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __CI_PROJECT_NAME__-ingress-backend
  namespace: __NAMESPACE__
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
      add_header Pragma "no-cache";
      add_header Expires "0";
spec:
  ingressClassName: nginx
  rules:
    - host: __INGRESS_DOMAIN__
      http:
        paths:
          - pathType: Prefix
            backend:
              service:
                name: __CI_PROJECT_NAME__-service
                port:
                  number: 3000
            path: __API_ENDPOINT_PREFIX__